<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <title>Wutong Leaf - Standard</title>
  <!-- 整个叶片编组，绕中心点(60,60)顺时针旋转150度，实现叶柄11点，叶尖5点 -->
  <g transform="rotate(150 60 60)">
    
    <!-- 叶片主体 (带有心形基部和深叶裂) -->
    <path d="M 60,80 
             C 40,105 5,85 15,65 
             Q 45,55 22,32 
             Q 48,35 60,15 
             Q 72,35 98,32 
             Q 75,55 105,65 
             C 115,85 80,105 60,80 Z" 
          fill="#226B2D" />
          
    <!-- 浅绿色叶脉与叶柄 -->
    <g stroke="#95D58C" stroke-linecap="round" stroke-linejoin="round">
      <!-- 突出的叶柄 (向下延伸) -->
      <line x1="60" y1="80" x2="60" y2="105" stroke-width="4" />
      
      <!-- 5条主叶脉 (从汇聚点60,80放射) -->
      <g stroke-width="2">
        <line x1="60" y1="80" x2="60" y2="15" />   <!-- 指向叶尖 -->
        <line x1="60" y1="80" x2="22" y2="32" />   <!-- 左上 -->
        <line x1="60" y1="80" x2="98" y2="32" />   <!-- 右上 -->
        <line x1="60" y1="80" x2="15" y2="65" />   <!-- 左下 -->
        <line x1="60" y1="80" x2="105" y2="65" />  <!-- 右下 -->
      </g>
    </g>
  </g>
</svg>