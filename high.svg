<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <title>Wutong Leaf - High Res</title>
  <g transform="rotate(150 60 60)">
    <!-- 叶片主体 -->
    <path d="M 60,80 C 40,105 5,85 15,65 Q 45,55 22,32 Q 48,35 60,15 Q 72,35 98,32 Q 75,55 105,65 C 115,85 80,105 60,80 Z" fill="#226B2D" />
    
    <g stroke="#95D58C" stroke-linecap="round" stroke-linejoin="round">
      <!-- 叶柄 -->
      <line x1="60" y1="80" x2="60" y2="105" stroke-width="4" />
      <!-- 主脉 -->
      <g stroke-width="2">
        <line x1="60" y1="80" x2="60" y2="15" />
        <line x1="60" y1="80" x2="22" y2="32" />
        <line x1="60" y1="80" x2="98" y2="32" />
        <line x1="60" y1="80" x2="15" y2="65" />
        <line x1="60" y1="80" x2="105" y2="65" />
      </g>
      <!-- 细微次级脉络 -->
      <g stroke-width="1" opacity="0.8">
        <!-- 中脉侧枝 -->
        <line x1="60" y1="50" x2="52" y2="42" />
        <line x1="60" y1="35" x2="66" y2="28" />
        <!-- 左上侧枝 -->
        <line x1="40" y1="55" x2="33" y2="62" />
        <line x1="33" y1="46" x2="25" y2="50" />
        <!-- 右上侧枝 -->
        <line x1="80" y1="55" x2="87" y2="62" />
        <line x1="87" y1="46" x2="95" y2="50" />
      </g>
    </g>
  </g>
</svg>