<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <title>Wutong Leaf - Favicon</title>
  <g transform="rotate(150 60 60)">
    <!-- 更加圆润粗壮的整体轮廓，防止缩小后破碎 -->
    <path d="M 60,80 C 35,110 -5,80 10,60 Q 40,55 20,25 Q 50,30 60,10 Q 70,30 100,25 Q 80,55 110,60 C 125,80 85,110 60,80 Z" fill="#226B2D" />
    
    <g stroke="#95D58C" stroke-linecap="round">
      <!-- 极度加粗的叶柄和最核心的三条主脉 -->
      <line x1="60" y1="80" x2="60" y2="105" stroke-width="8" />
      <g stroke-width="5">
        <line x1="60" y1="80" x2="60" y2="15" />  <!-- 中 -->
        <line x1="60" y1="80" x2="20" y2="25" />  <!-- 左 -->
        <line x1="60" y1="80" x2="100" y2="25" /> <!-- 右 -->
      </g>
    </g>
  </g>
</svg>